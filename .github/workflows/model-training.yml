name: ML Model Training Pipeline

"on":
  workflow_dispatch: {}
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

env:
  PYTHON_VERSION: '3.10'
  AZURE_REGION: norwayeast

jobs:
  train-model:
    name: Train ML Models (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Smoke test
        run: |
          python -V
          echo "workflow parsed and job started"

  # Re-enable training/eval/deploy steps after this smoke run succeeds.

